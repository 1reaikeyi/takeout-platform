spring.application.name=ai-hotline-service
server.port=8080
#file
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# image
image.max-width=2048
image.max-height=2048
# start
spring.ai.openai.base-url=https://api.siliconflow.cn
spring.ai.openai.api-key=${PATH_ai_siliconflow_api}
spring.ai.openai.chat.options.model=Qwen/Qwen3.5-397B-A17B

# mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/use_take_out
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}

logging.charset.console=UTF-8
logging.level.org.springframework.ai=debug
logging.level.org.springframework.web.client: info
