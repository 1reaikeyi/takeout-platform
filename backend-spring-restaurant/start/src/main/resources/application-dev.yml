take_out:
  logging: info
#数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: use_take_out
    username: root
    password: ${MYSQL_PASSWORD}
#redis配置文件
  redis:
    host: 192.168.80.128
    port: 6379
    password: ${MYSQL_PASSWORD}
    database: 0

#文件上传
  # 阿里云OSS 地域节点（服务访问地址）
  endpoint: https://oss-cn-beijing.aliyuncs.com
  # 阿里云身份凭证ID（相当于“账号”）
  access-key-id: ${PATH_oss_aliyun_id}
  # 阿里云身份凭证密钥（相当于“密码”）
  access-key-secret: ${PATH_oss_aliyun_secret}
  # 阿里云OSS 存储空间名称（相当于“网盘文件夹”）
  bucket-name: java-web-ai-wangnian
#  region: cn-beijing


# 支付宝支付
  alipay:
    app-id: 9021000162662012
    app-private-key: ${PATH_pay_alibaba_private}
    alipay-public-key: ${PATH_pay_alibaba_public}
    notify-url: https://localhost:8080/pay/notify
    return-url: http://localhost:8080/pay/return
